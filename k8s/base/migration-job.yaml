apiVersion: batch/v1
kind: Job
metadata:
  name: plexdash-migration
  namespace: plexdash
  labels:
    app: plexdash-migration
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: plexdash-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migration
          image: plexdash-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: plexdash-backend-secrets
                  key: database-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
