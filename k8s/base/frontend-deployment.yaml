apiVersion: apps/v1
kind: Deployment
metadata:
  name: plexdash-frontend
  namespace: plexdash
  labels:
    app: plexdash-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plexdash-frontend
  template:
    metadata:
      labels:
        app: plexdash-frontend
    spec:
      containers:
        - name: frontend
          image: plexdash-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: false
            runAsNonRoot: false
      volumes:
        - name: nginx-config
          configMap:
            name: plexdash-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: plexdash-frontend
  namespace: plexdash
spec:
  selector:
    app: plexdash-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
