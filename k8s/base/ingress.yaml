apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plexdash-ingress
  namespace: plexdash
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - plexdash.example.com
  #     secretName: plexdash-tls
  rules:
    - host: plexdash.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: plexdash-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: plexdash-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plexdash-frontend
                port:
                  number: 80
