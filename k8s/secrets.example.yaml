# Copy this file to secrets.yaml and fill in your values
# DO NOT commit secrets.yaml to version control!
#
# Apply with: kubectl apply -f k8s/secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: plexdash-db-credentials
  namespace: plexdash
type: kubernetes.io/basic-auth
stringData:
  username: plexdash
  password: CHANGE_ME_DB_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: plexdash-backend-secrets
  namespace: plexdash
type: Opaque
stringData:
  # Use the same password as above
  database-url: "postgresql://plexdash:CHANGE_ME_DB_PASSWORD@plexdash-db-rw:5432/plexdash"
  # Your Plex token (optional - can be configured in UI)
  plex-token: ""
